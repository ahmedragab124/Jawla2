<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <!-- Circular/Sun background -->
  <circle cx="256" cy="256" r="230" fill="url(#bg-grad)" />
  
  <!-- Outer border ring -->
  <circle cx="256" cy="256" r="220" stroke="#B8860B" stroke-width="8" stroke-dasharray="15, 10" opacity="0.6" />
  
  <!-- Stylized Compass / Travel lines -->
  <path d="M256 40 L256 80 M256 432 L256 472 M40 256 L80 256 M432 256 L472 256" stroke="#F4D58D" stroke-width="6" stroke-linecap="round" opacity="0.8" />
  
  <!-- Pyramids of Giza silhouettes -->
  <!-- Main Pyramid -->
  <polygon points="256,160 140,360 372,360" fill="url(#pyr-primary)" filter="url(#drop-shadow)" />
  <!-- Secondary Pyramid -->
  <polygon points="350,200 260,360 440,360" fill="url(#pyr-secondary)" opacity="0.85" />
  <!-- Third small Pyramid -->
  <polygon points="170,240 100,360 240,360" fill="url(#pyr-tertiary)" opacity="0.75" />

  <!-- A winding travel path/road leading to the pyramids -->
  <path d="M256 360 C 230 400, 290 430, 256 470" stroke="#B8860B" stroke-width="12" stroke-linecap="round" fill="none" />
  
  <!-- A small star/sun shining over the pyramids -->
  <circle cx="256" cy="120" r="20" fill="#F4D58D" filter="url(#glow)" />
  <path d="M256 90 L256 150 M226 120 L286 120" stroke="#F4D58D" stroke-width="4" stroke-linecap="round" />

  <!-- Definitions for gradients and filters -->
  <defs>
    <!-- Background Radial Gradient: Warm desert sky -->
    <radialGradient id="bg-grad" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fff6e6" />
      <stop offset="50%" stop-color="#fdf0d5" />
      <stop offset="100%" stop-color="#f5e1b8" />
    </radialGradient>

    <!-- Primary Pyramid Gradient: Golden Brown -->
    <linearGradient id="pyr-primary" x1="256" y1="160" x2="256" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B8860B" />
      <stop offset="100%" stop-color="#8B5E3C" />
    </linearGradient>

    <!-- Secondary Pyramid Gradient -->
    <linearGradient id="pyr-secondary" x1="350" y1="200" x2="350" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C79A2D" />
      <stop offset="100%" stop-color="#9E782F" />
    </linearGradient>

    <!-- Tertiary Pyramid Gradient -->
    <linearGradient id="pyr-tertiary" x1="170" y1="240" x2="170" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A06D24" />
      <stop offset="100%" stop-color="#704A18" />
    </linearGradient>

    <!-- Drop shadow for depth -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#5C4B3B" flood-opacity="0.25" />
    </filter>

    <!-- Glow effect for the sun star -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
</svg>